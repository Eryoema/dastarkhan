services:
  - type: web
    name: dastarkhan
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn dastarkhan_backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: GEMINI_MODEL
        value: "gemini-2.5-flash"
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: dastarkhan-db
          property: connectionString

databases:
  - name: dastarkhan-db
    plan: free
